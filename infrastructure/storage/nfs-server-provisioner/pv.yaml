apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-nfs-server-provisioner-0
spec:
  capacity:
    storage: 1000Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /var/mnt/media-data
  claimRef:
    namespace: nfs-server-provisioner
    name: data-nfs-server-provisioner-nfs-server-provisioner-0
  persistentVolumeReclaimPolicy: Retain