  name: longhorn
  namespace: default
spec:
  interval: 30s
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: homelab-github-flux-sync
    namespace: flux-system
  path: ./infrastructure/storage/longhorn
  prune: true
