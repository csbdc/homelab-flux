apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: external-secrets
  name: ca-store-role
rules:
- apiGroups: [""]
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.k8s.io
  resources:
  - selfsubjectrulesreviews
  verbs:
  - create
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ca-store
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ca-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ca-store-role
subjects:
- kind: ServiceAccount
  name: ca-store
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: ca-store
  annotations:
    external-secrets.io/ignore-maintenance-checks: "true"
spec:
  provider:
    kubernetes:
      remoteNamespace: cert-manager
      server:
        url: "kubernetes.default.svc.cluster.local"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: ca-store
          namespace: external-secrets

