apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-arpa-tls
  namespace: external-secrets
spec:
  secretName: home-arpa-tls
  issuerRef:
    kind: ClusterIssuer
    name: home-ca-issuer
  commonName: home.arpa
  dnsNames:
    - grafana.home.arpa
    - prometheus.home.arpa
    - alertmanager.home.arpa
