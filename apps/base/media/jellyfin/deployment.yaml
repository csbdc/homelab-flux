apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jellyfin
  name: jellyfin-prod-media-deployment
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      automountServiceAccountToken: false
      containers:
      - securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        image: docker.io/jellyfin/jellyfin
        name: jellyfin
        envFrom:
        - configMapRef:
            name: jellyfin-prod-media-config
        ports:
          - containerPort: 8096
            name: http
            protocol: TCP
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 500Mi
        volumeMounts:
        - name: app-data
          mountPath: /config
        - name: tv-data
          mountPath: /tv
        - name: movies-data
          mountPath: /movies
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: jellyfin-prod-media-pvc
      - name: tv-data
        nfs:
          server: 192.168.10.197
          path: /srv/nfs/tv
          readOnly: true
      - name: movies-data
        nfs:
          server: 192.168.10.197
          path: /srv/nfs/movies
          readOnly: true
