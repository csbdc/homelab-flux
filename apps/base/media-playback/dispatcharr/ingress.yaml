apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatcharr-prod-ingress
  namespace: dispatcharr
  labels:
    app: dispatcharr
spec:
  ingressClassName: nginx
  rules:
  - host: "dispatcharr.cbxon.local"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: dispatcharr-prod-svc
            port:
              number: 9191