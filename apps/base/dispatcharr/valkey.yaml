apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: default
spec:
  targetNamespace: dispatcharr
  interval: 10m
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: default
      interval: 10m
  values:
    nameOverride: dispatcharr-prod-valkey
    commonLabels:
      app: dispatcharr
      tier: message