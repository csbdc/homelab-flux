apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: household-budget-planner
  annotations:
    cert-manager.io/cluster-issuer: home-ca-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - budget.home.arpa
      secretName: budget-home-arpa-tls
  rules:
    - host: budget.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: household-budget-planner
                port:
                  name: http
