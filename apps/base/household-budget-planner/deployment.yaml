apiVersion: apps/v1
kind: Deployment
metadata:
  name: household-budget-planner
  labels:
    app.kubernetes.io/name: household-budget-planner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: household-budget-planner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: household-budget-planner
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: household-budget-planner
          image: ghcr.io/csbdc/household-budget-planner:sha-abc03a8@sha256:6bc65d020fc30f6223a6239398683a80b920c1f364cdaa7612fc5426c2f93a9c
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /app/.wrangler
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: household-budget-planner-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
