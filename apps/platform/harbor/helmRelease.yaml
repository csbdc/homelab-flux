apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  install:
  targetNamespace: harbor
  interval: 10m
  chart:
    spec:
      chart: harbor
      sourceRef:
        kind: HelmRepository
        name: harbor
      interval: 10m
  values:
    expose:
      ingress:
        className: nginx
        hosts:
          core: harbor.home.arpa
