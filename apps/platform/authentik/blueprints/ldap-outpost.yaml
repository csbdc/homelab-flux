# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Home LDAP outpost
  labels:
    blueprints.goauthentik.io/description: Secure LDAP provider and Kubernetes outpost
entries:
  - model: authentik_core.group
    id: management-users-group
    identifiers:
      name: ManagementUsers
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: jellyfin-users-group
    identifiers:
      name: JellyfinUsers
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: jellyfin-admins-group
    identifiers:
      name: JellyfinAdmins
    attrs:
      is_superuser: false

  - model: authentik_rbac.role
    id: ldap-search-role
    identifiers:
      name: Home LDAP Search

  - model: authentik_core.user
    id: ldap-search-service-account
    identifiers:
      username: ldap-search
    attrs:
      name: LDAP Search Service Account
      type: service_account
      path: goauthentik.io/service-accounts
      attributes:
        goauthentik.io/user/token-expires: false
      roles:
        - !KeyOf ldap-search-role

  - model: authentik_core.token
    identifiers:
      identifier: ldap-search-app-password
    attrs:
      intent: app_password
      user: !KeyOf ldap-search-service-account
      description: App password for LDAP directory searches
      expiring: false

  - model: authentik_providers_ldap.ldapprovider
    id: home-ldap-provider
    identifiers:
      name: Home LDAP
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      base_dn: DC=home,DC=arpa
      certificate: !Find [authentik_crypto.certificatekeypair, [name, home-arpa-tls]]
      tls_server_name: ldap.home.arpa
      bind_mode: direct
      search_mode: direct
      mfa_support: false
    permissions:
      - permission: authentik_providers_ldap.search_full_directory
        role: !KeyOf ldap-search-role

  - model: authentik_core.application
    identifiers:
      slug: home-ldap
    attrs:
      name: Jellyfin
      provider: !KeyOf home-ldap-provider
      meta_launch_url: https://jellyfin.home.arpa
      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/jellyfin.svg
      group: Media

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, home-ldap]]
      order: 0
    attrs:
      group: !KeyOf jellyfin-users-group

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, home-ldap]]
      order: 1
    attrs:
      user: !KeyOf ldap-search-service-account

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, home-ldap]]
      order: 2
    attrs:
      group: !KeyOf jellyfin-admins-group

  - model: authentik_outposts.outpost
    identifiers:
      name: Home LDAP outpost
    attrs:
      type: ldap
      providers:
        - !KeyOf home-ldap-provider
      service_connection: !Find [authentik_outposts.kubernetesserviceconnection, [name, Local Kubernetes Cluster]]
      config:
        authentik_host: http://authentik-server.authentik.svc.cluster.local
        kubernetes_namespace: authentik
        kubernetes_replicas: 1
        kubernetes_service_type: ClusterIP
        kubernetes_json_patches:
          service:
            - op: remove
              path: /spec/ports/2
            - op: remove
              path: /spec/ports/0
