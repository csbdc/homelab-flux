apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxied-ingress
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: home-arpa-tls
  rules:
    - host: "sonarr.home.arpa"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: "radarr.home.arpa"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: "prowlarr.home.arpa"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: "bazarr.home.arpa"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
