apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  length: 42
  digits: 5
  symbols: 5
  symbolCharacters: "-_$@"
  noUpper: false
  allowRepeat: true
  secretKeys:
    - secret-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: "30s"
  target:
    name: authentik-secrets
  dataFrom:
  - sourceRef:
      generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: authentik-secrets