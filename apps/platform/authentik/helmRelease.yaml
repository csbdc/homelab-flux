apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: default
spec:
  install:
    createNamespace: true
  targetNamespace: authentik
  interval: 10m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: default
      interval: 10m
  values:
    expose:
      ingress:
        className: nginx
        hosts:
          core: authentik.home.arpa
