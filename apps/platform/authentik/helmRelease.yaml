apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: default
spec:
  install:
    createNamespace: true
  targetNamespace: authentik
  interval: 10m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: default
      interval: 10m
  values:
    authentik:
      secret_key: file:///authentik-secrets/secret-key
      postgresql:
        host: file:///authentik-postgresql/host
        name: file:///authentik-postgresql/dbname
        user: file:///authentik-postgresql/username
        password: file:///authentik-postgresql/password
    global:
      volumes:
        - name: authentik-secrets
          secret:
            secretName: authentik-secrets
        - name: authentik-postgresql
          secret:
            secretName: authentik-pg-app
      volumeMounts:
        - name: authentik-secrets
          mountPath: /authentik-secrets
        - name: authentik-postgresql
          mountPath: /authentik-postgresql
    server:
      ingress:
        enabled: true
        ingressclassName: nginx
        hosts:
          - authentik.home.arpa

