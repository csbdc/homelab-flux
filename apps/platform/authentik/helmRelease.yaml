apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: default
spec:
  install:
    createNamespace: true
  targetNamespace: authentik
  interval: 10m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: default
      interval: 10m
  values:
    authentik:
      secret_key: file:///authentik-secrets/secret_key
    global:
      volumes:
        - name: authentik-secrets
          secret:
            secretName: authentik-secrets
    server:
      ingress:
        enabled: true
        ingressclassName: nginx
        hosts:
          - authentik.home.arpa

