apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 10m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
      interval: 10m
  values:
    authentik:
      secret_key: file:///authentik-secrets/secret-key
      postgresql:
        host: file:///authentik-postgresql/host
        name: file:///authentik-postgresql/dbname
        user: file:///authentik-postgresql/username
        password: file:///authentik-postgresql/password
    global:
      volumes:
        - name: authentik-secrets
          secret:
            secretName: authentik-secrets
        - name: authentik-postgresql
          secret:
            secretName: authentik-pg-app
        - name: home-arpa-tls
          secret:
            secretName: home-arpa-tls
      volumeMounts:
        - name: authentik-secrets
          mountPath: /authentik-secrets
        - name: authentik-postgresql
          mountPath: /authentik-postgresql
        - name: home-arpa-tls
          mountPath: /certs
    server:
      ingress:
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        enabled: true
        ingressClassName: nginx
        hosts:
          - authentik.home.arpa
        tls:
          - secretName: home-arpa-tls
