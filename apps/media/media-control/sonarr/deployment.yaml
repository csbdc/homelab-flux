apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: sonarr
  name: sonarr-prod-media-deployment
  namespace: media-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      automountServiceAccountToken: false
      initContainers:
        - name: copy-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cp /source/config.xml /config/config.xml
              chmod 0444 /config/config.xml
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /source/config.xml
              subPath: config.xml
              readOnly: true
            - name: app-data
              mountPath: /config
      containers:
      - securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        image: ghcr.io/csbdc/sonarr:main
        name: sonarr
        livenessProbe:
          httpGet:
            path: /ping
            port: 8989
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: 8989
          initialDelaySeconds: 20
          periodSeconds: 3
        env:
          - name: PGID
            value: "1000"
          - name: PUID
            value: "1000"
        ports:
          - containerPort: 8989
            name: http
            protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 500Mi
          requests:
            cpu: 250m
            memory: 250Mi
        volumeMounts:
        - name: app-data
          mountPath: /config
        - name: media-data
          mountPath: /tv
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: sonarr-prod-media-pvc
      - name: config
        secret:
          secretName: sonarr-config
          items:
            - key: config.xml
              path: config.xml
      - name: media-data
        nfs:
          server: 10.102.53.187
          path: /export/pvc-c3aa9600-76a0-4801-80d7-c709f29ba3e2/tv
      - name: downloads
        nfs:
          server: 10.102.53.187
          path: /export/pvc-c3aa9600-76a0-4801-80d7-c709f29ba3e2/downloads
