apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-prod-media-ingress
  namespace: media-control
  annotations: 
    cert-manager.io/cluster-issuer: home-ca-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sonarr.home.arpa
    secretName: media-prod-tls-internal
  rules:
  - host: "sonarr.home.arpa"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: sonarr-prod-media-svc
            port:
              number: 8989