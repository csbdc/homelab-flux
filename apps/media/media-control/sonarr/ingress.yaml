apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-prod-media-ingress
  namespace: media-control
spec:
  ingressClassName: nginx
  rules:
  - host: "sonarr.home.arpa"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: sonarr-prod-media-svc
            port:
              number: 8989