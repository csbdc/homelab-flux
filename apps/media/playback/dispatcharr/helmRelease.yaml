apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
spec:
  targetNamespace: media
  interval: 10m
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
      interval: 10m
  values:
    nameOverride: dispatcharr-prod-valkey
    commonLabels:
      app: dispatcharr
      tier: message
