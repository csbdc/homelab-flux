              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
          envFrom:
            - configMapRef:
                name: dispatcharr-prod-celery-config
          resources: {}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: home-ca-bundle
              mountPath: /etc/ssl/home-arpa
              readOnly: true
      volumes:
        - name: home-ca
          secret:
            secretName: home-arpa-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: home-ca-bundle
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-prod-pvc
