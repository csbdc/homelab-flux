apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dispatcharr
    tier: frontend
  name: dispatcharr-prod-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr
      tier: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dispatcharr
        tier: frontend
    spec:
      initContainers:
        - name: build-ca-bundle
          image: alpine:3.22
          command:
            - sh
            - -c
            - |
              set -eu
              system_bundle=""
              for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -s "$candidate" ]; then
                  system_bundle="$candidate"
                  break
                fi
              done
              [ -n "$system_bundle" ]
              cat "$system_bundle" /home-ca/ca.crt > /ca-bundle/ca-certificates.crt
              cp /home-ca/ca.crt /ca-bundle/home-arpa-ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home-ca
              mountPath: /home-ca
              readOnly: true
            - name: home-ca-bundle
              mountPath: /ca-bundle
      containers:
        - name: web
          image: ghcr.io/dispatcharr/dispatcharr:latest
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-prod-pg-app
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-prod-pg-app
                  key: port
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-prod-pg-app
                  key: dbname
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-prod-pg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-prod-pg-app
                  key: password
            - name: SSL_CERT_FILE
              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
          envFrom:
            - configMapRef:
                name: dispatcharr-prod-web-config
          ports:
            - containerPort: 9191
              name: http
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: home-ca-bundle
              mountPath: /etc/ssl/home-arpa
              readOnly: true
      volumes:
        - name: home-ca
          secret:
            secretName: home-arpa-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: home-ca-bundle
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-prod-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dispatcharr
    tier: app
  name: dispatcharr-prod-celery-deployment
  namespace: media-playback
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr
      tier: app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dispatcharr
        tier: app
    spec:
      initContainers:
        - name: build-ca-bundle
          image: alpine:3.22
          command:
            - sh
            - -c
            - |
              set -eu
              system_bundle=""
              for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -s "$candidate" ]; then
                  system_bundle="$candidate"
                  break
                fi
              done
              [ -n "$system_bundle" ]
              cat "$system_bundle" /home-ca/ca.crt > /ca-bundle/ca-certificates.crt
              cp /home-ca/ca.crt /ca-bundle/home-arpa-ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home-ca
              mountPath: /home-ca
              readOnly: true
            - name: home-ca-bundle
              mountPath: /ca-bundle
      containers:
