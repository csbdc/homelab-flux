apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jellyfin
  name: jellyfin-prod-media-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - talos-uh1-bo3
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: docker.io/jellyfin/jellyfin:12.0-rc2
          name: jellyfin
          envFrom:
            - configMapRef:
                name: jellyfin-prod-media-config
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: jellyfin-prod-media-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-share
