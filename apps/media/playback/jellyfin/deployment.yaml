apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jellyfin
  name: jellyfin-prod-media-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - talos-uh1-bo3
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers:
        - name: build-ca-bundle
          image: alpine:3.22
          command:
            - sh
            - -c
            - |
              set -eu
              system_bundle=""
              for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -s "$candidate" ]; then
                  system_bundle="$candidate"
                  break
                fi
              done
              [ -n "$system_bundle" ]
              cat "$system_bundle" /home-ca/ca.crt > /ca-bundle/ca-certificates.crt
              cp /home-ca/ca.crt /ca-bundle/home-arpa-ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home-ca
              mountPath: /home-ca
              readOnly: true
            - name: home-ca-bundle
              mountPath: /ca-bundle
      containers:
        - securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: docker.io/jellyfin/jellyfin:12.0-rc2
          name: jellyfin
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
          envFrom:
            - configMapRef:
                name: jellyfin-prod-media-config
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: media
              mountPath: /media
            - name: home-ca-bundle
              mountPath: /etc/ssl/home-arpa
              readOnly: true
      volumes:
        - name: home-ca
          secret:
            secretName: home-arpa-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: home-ca-bundle
          emptyDir: {}
        - name: app-data
          persistentVolumeClaim:
            claimName: jellyfin-prod-media-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-share
