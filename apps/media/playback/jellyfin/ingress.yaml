apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin-prod-media-ingress-internal
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: home-arpa-tls
  rules:
    - host: "jellyfin.home.arpa"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: jellyfin-prod-media-svc
                port:
                  number: 8096
