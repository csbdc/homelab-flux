apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-arpa-tls
spec:
  dnsNames:
    - jellyfin.home.arpa
    - seerr.home.arpa
    - dispatcharr.home.arpa
    - qbittorrent-0.home.arpa
    - qbittorrent-1.home.arpa
    - qbittorrent-2.home.arpa
    - bazarr.home.arpa
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: home-ca-issuer
  secretName: home-arpa-tls
  usages:
    - digital signature
    - key encipherment
