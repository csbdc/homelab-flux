apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 1
  selector:
  strategy:
    type: Recreate
  template:
    metadata:
    spec:
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers:
        - name: build-ca-bundle
          image: alpine:3.22
          command:
            - sh
            - -c
            - |
              set -eu
              system_bundle=""
              for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -s "$candidate" ]; then
                  system_bundle="$candidate"
                  break
                fi
              done
              [ -n "$system_bundle" ]
              cat "$system_bundle" /home-ca/ca.crt > /ca-bundle/ca-certificates.crt
              cp /home-ca/ca.crt /ca-bundle/home-arpa-ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home-ca
              mountPath: /home-ca
              readOnly: true
            - name: home-ca-bundle
              mountPath: /ca-bundle
        - securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: config
              mountPath: /source/config.xml
              subPath: config.xml
              readOnly: true
          name: copy-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cp /source/config.xml /config/config.xml
              chmod 0664 /config/config.xml
      containers:
        - name: arr-app
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/home-arpa/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/home-arpa/ca-certificates.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 1
              memory: 1024Mi
            requests:
              cpu: 250m
              memory: 250Mi
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: home-ca-bundle
              mountPath: /etc/ssl/home-arpa
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ping
              port: 0000
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 0000
            initialDelaySeconds: 20
            periodSeconds: 3
          ports: []
      volumes:
        - name: home-ca
          secret:
            secretName: home-arpa-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: home-ca-bundle
          emptyDir: {}
        - name: downloads
          nfs:
            server: ${server}
            path: ${path}/downloads
