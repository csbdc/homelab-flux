  sourceRef:
    kind: GitRepository
    name: homelab-github-flux-sync
    namespace: flux-system
  path: ./apps/media/ingest/prowlarr
  prune: true
  postBuild:
      substituteFrom:
        - kind: ConfigMap
          name: media-share
