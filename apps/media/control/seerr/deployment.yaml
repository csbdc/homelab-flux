apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: seerr
  name: seerr-prod-media-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  strategy: {}
  template:
    metadata:
      labels:
        app: seerr
    spec:
      securityContext:
        fsGroup: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers:
        - name: merge-config
          image: ghcr.io/csbdc/jq:main
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              if [ -f /app/config/settings.json ]; then
                jq -s '.[0] * .[1]' /app/config/settings.json /secret/config.json > /tmp/settings.json
              else
                cp /secret/config.json /tmp/settings.json
              fi

              cat /tmp/settings.json > /app/config/settings.json
          volumeMounts:
            - name: oidc-config
              mountPath: /secret/config.json
              subPath: config.json
              readOnly: true
            - name: data
              mountPath: /app/config
        - name: build-ca-bundle
          image: alpine:3.22
          command:
            - sh
            - -c
            - |
              set -eu
              system_bundle=""
              for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem; do
                if [ -s "$candidate" ]; then
                  system_bundle="$candidate"
                  break
                fi
              done
              [ -n "$system_bundle" ]
              cat "$system_bundle" /home-ca/ca.crt > /ca-bundle/ca-certificates.crt
              cp /home-ca/ca.crt /ca-bundle/home-arpa-ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home-ca
              mountPath: /home-ca
              readOnly: true
            - name: home-ca-bundle
              mountPath: /ca-bundle
      containers:
        - securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: docker.io/seerr/seerr:preview-new-oidc
          name: seerr
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/home-arpa/home-arpa-ca.crt
            - name: SSL_CERT_FILE
              value: /etc/ssl/home-arpa/ca-certificates.crt
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 250m
              memory: 250Mi
          volumeMounts:
            - name: data
              mountPath: /app/config
              readOnly: false
            - name: home-ca-bundle
              mountPath: /etc/ssl/home-arpa
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seerr-prod-media-pvc
        - name: oidc-config
          secret:
            secretName: seerr-oidc-config
            items:
              - key: config.json
                path: config.json
        - name: home-ca
          secret:
            secretName: home-arpa-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: home-ca-bundle
          emptyDir: {}
